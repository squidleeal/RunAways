{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Maratona</title>
    <link rel="stylesheet" href="{% static 'sistemas/maratonas.css' %}">
</head>
<body>
    <main class="page">
        <header class="header">
            <h1>Maratonas</h1>
            <a class="back-link" href="{% url 'home' %}">Voltar para Login</a>
        </header>

        <nav class="tabs">
            <a class="tab-link {% if active_tab == 'lista' %}active{% endif %}" href="{% url 'maratonas' %}">Lista</a>
            <a class="tab-link {% if active_tab == 'criar' %}active{% endif %}" href="{% url 'criar_maratona' %}">Criar Maratona</a>
        </nav>

        <section class="form-card">
            <h2>Nova Maratona</h2>

            {% if messages %}
                {% for message in messages %}
                    <p class="message {{ message.tags }}">{{ message }}</p>
                {% endfor %}
            {% endif %}

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="form-field">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" name="cidade" required>
                </div>

                <div class="form-field">
                    <label for="distancia">Distancia (km)</label>
                    <input type="number" id="distancia" name="distancia" step="0.01" min="0.01" required>
                </div>

                <div class="form-field">
                    <label for="data">Data</label>
                    <input type="date" id="data" name="data" required>
                </div>

                <div class="form-field">
                    <label for="imagem">Imagem da maratona</label>
                    <input type="file" id="imagem" name="imagem" accept="image/*">
                </div>

                <button class="submit-button" type="submit">Salvar Maratona</button>
            </form>
        </section>
    </main>
</body>
</html>
